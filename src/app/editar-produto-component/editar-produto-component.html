<h1>{{titulo}}</h1>

<form>
    <label>Id</label>
    <input type="text" id="input-id" name="input-id" [(ngModel)]="produto.id"/> <br>
    
    <label>Descrição</label>
    <input type="text" id="input-descricao" name="input-descricao" [(ngModel)]="produto.descricao"/> <br>

    <label>Preço</label>
    <input type="text" id="input-preco" name="input-preco" [(ngModel)]="produto.preco"/> <br>

    <button (click)="alterar()">Alterar</button>
    <button (click)="cancelar()">Concelar</button>
</form>
